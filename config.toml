size_max = 14.0                            # Максимальный размер дымовой частицы.
speed_min = 18.0                           # Минимальная скорость дыма.
speed_max = 52.0                           # Максимальная скорость дыма.
lifetime_min_seconds = 0.14                # Минимальное время жизни дыма.
lifetime_max_seconds = 1.28                # Максимальное время жизни дыма.
max_count = 280                            # Максимум активных дымовых частиц одновременно.

[effects.gore]
bloodiness = 100                           # Общая кровавость сцены от 0 до 100.
burst_count_min = 14                       # Минимум частиц крови в burst-эффекте.
burst_count_max = 28                       # Максимум частиц крови в burst-эффекте.
burst_size_min = 3.0                       # Минимальный размер кровавой частицы.
burst_size_max = 8.0                       # Максимальный размер кровавой частицы.
burst_speed_min = 180.0                    # Минимальная скорость разлёта крови.
burst_speed_max = 420.0                    # Максимальная скорость разлёта крови.
burst_lifetime_min_seconds = 0.10          # Минимальное время жизни кровавой частицы.
burst_lifetime_max_seconds = 0.42          # Максимальное время жизни кровавой частицы.
pool_size_min = 12.0                       # Минимальный размер лужи крови.
pool_size_max = 42.0                       # Максимальный размер лужи крови.
pool_growth_seconds = 0.22                 # Время разрастания лужи крови.
decal_chance = 0.9                         # Шанс появления кровавого декаля на стене.
decal_size_min = 10.0                      # Минимальный размер кровавого декаля.
decal_size_max = 24.0                      # Максимальный размер кровавого декаля.
decal_lifetime_seconds = 45.0              # Сколько живут кровавые декали.
max_blood_particles = 420                  # Максимум активных кровавых частиц.
max_blood_pools = 96                       # Максимум луж крови одновременно.
max_blood_decals = 96                      # Максимум кровавых декалей одновременно.
kill_freeze_seconds = 0.035                # Длительность freeze-frame при убийстве.
