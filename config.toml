[app]
name = "Top Down Shooter"                  # Это имя проекта, которое можно показывать в заголовках и логах. Оно помогает быстро понять, какой конфиг сейчас загружен.
default_map_mode = "debug_static"          # Это режим карты по умолчанию при запуске игры. Его удобно использовать для быстрого старта без выбора меню.
default_seed = 42                          # Это базовый seed для процедурной генерации. Если seed не передан явно, игра использует именно это значение.

[window]
width = 1280                               # Это ширина игрового окна в пикселях. От неё зависит видимая область и плотность интерфейса.
height = 960                               # Это высота игрового окна в пикселях. Вместе с шириной она задаёт базовое разрешение запуска.
target_fps = 60                            # Это целевая частота кадров для игрового цикла. Движение, тайминги и анимации рассчитываются с опорой на это значение.
resizable = false                          # Этот флаг разрешает или запрещает менять размер окна мышкой. Для стабильного тестирования лучше держать его выключенным.

[world]
tile_size = 64                             # Это размер одного тайла мира в пикселях. Через него привязаны карта, хитбоксы, спавны и рендер.

[player]
speed = 400.0                              # Это скорость перемещения игрока по карте. Значение влияет на темп боя и на ощущение отзывчивости управления.
width_ratio = 0.56                         # Это ширина хитбокса игрока относительно размера тайла. Параметр нужен, чтобы коллизия совпадала с визуальным силуэтом.
height_ratio = 0.56                        # Это высота хитбокса игрока относительно размера тайла. Параметр помогает точно настроить проходы и столкновения.
starting_weapon = "smg"                    # Это оружие, которое игрок получает при старте уровня. Имя должно совпадать с секцией в блоке weapons.
health = 100.0                             # Это базовое здоровье игрока. Значение используется игровой логикой и не обязано показываться как полоска на экране.
hurt_flash_seconds = 0.18                  # Это длительность визуальной подсветки игрока после получения урона. Эффект нужен для читаемого hit feedback.

[weapons.shotgun]
fire_interval_seconds = 0.12               # Это интервал между выстрелами. Чем меньше значение, тем чаще оружие может стрелять.
projectile_speed = 2600.0                  # Это техническая скорость пули или луча для внутренних расчётов. Параметр влияет на эффекты и на совместимость со старой моделью projectile.
projectile_lifetime_seconds = 0.08         # Это время жизни пули или выстрельного следа в расчётах. Даже при hitscan параметр оставлен для совместимости и служебной логики.
projectile_radius = 3.0                    # Это радиус попадания пули. Значение определяет ширину проверки пересечения с целью.
muzzle_offset = 29.0                       # Это смещение точки дула вперёд от центра персонажа. Через этот параметр выравнивается место старта выстрела.
muzzle_side_offset = 11.0                  # Это боковое смещение точки дула относительно центра персонажа. Оно нужно, чтобы луч шёл из ствола, а не из середины корпуса.
tracer_every_n_shot = 3                    # Этот параметр говорит, на каждый какой по счёту выстрел рисовать трассер. Так очередь выглядит живее и не превращается в сплошной лазер.
tracer_width = 4.0                         # Это толщина внешнего слоя трассера. Параметр влияет на читаемость выстрела в движении.
tracer_core_width = 1.5                    # Это толщина яркого внутреннего ядра трассера. Он делает линию более контрастной и “злой” по ощущению.
tracer_probability = 1.0                   # Это вероятность появления трассера, если выстрел проходит по правилу every_n_shot. Значение 1.0 означает, что трассер появляется всегда.
tracer_min_fraction = 0.35                 # Это минимальная доля длины выстрела, на которую может растянуться трассер. Параметр помогает избежать одинаковых коротких линий.
tracer_max_fraction = 0.9                  # Это максимальная доля длины выстрела для трассера. За счёт диапазона от min до max эффект выглядит менее повторяющимся.
tracer_lifetime_seconds = 0.05             # Это время жизни трассера на экране. Короткое значение делает стрельбу резкой и аркадной.
impact_mark_lifetime_seconds = 8.0         # Это время жизни следа попадания на поверхности. Чем больше значение, тем дольше комната “помнит” перестрелку.
impact_mark_max_count = 120                # Это максимум следов попадания, которые могут одновременно жить на сцене. Ограничение нужно для контроля производительности.
spread_degrees = 0.8                       # Это разброс выстрела в градусах. Малое значение делает оружие точнее и предсказуемее.
max_range = 760.0                          # Это максимальная дальность выстрела. Дальше этого расстояния луч просто не проверяется.
impact_mark_size = 9.0                     # Это общий размер следа попадания на окружении. Значение влияет на читаемость попаданий по стенам и укрытиям.
bullet_hole_diameter = 7.0                 # Это диаметр чёрной дырки от пули внутри следа попадания. Через этот параметр удобно отдельно усилять “жёсткость” огнестрела.
damage = 34.0                              # Это урон одного попадания данным оружием. Значение напрямую влияет на число выстрелов, нужных для убийства.
muzzle_flash_size = 26.0                   # Это размер вспышки у дула. Параметр сильно влияет на визуальный стиль и агрессивность стрельбы.
muzzle_flash_lifetime_seconds = 0.045      # Это время жизни вспышки у дула. Короткая вспышка делает оружие более “панчевым”.
recoil_distance = 7.0                      # Это визуальная сила отдачи назад. Параметр задаёт, насколько заметно оружие и персонаж дёргаются при выстреле.
recoil_recovery_seconds = 0.07             # Это время возврата после отдачи. Меньшее значение делает стрельбу резче, большее — тяжелее и вязче.
screen_shake_magnitude = 2.8               # Это сила экранной тряски на выстрел. Значение должно быть заметным, но не мешающим целиться.
screen_shake_duration_seconds = 0.055      # Это длительность экранной тряски. Короткий импульс обычно ощущается лучше, чем длинное дрожание.
shell_enabled = true                       # Этот флаг включает выброс гильз. Если выключить параметр, соответствующий VFX просто не будет создаваться.
shell_size = 4.6                           # Это размер гильзы в пикселях. Более крупные гильзы лучше читаются сверху как стилизованный эффект.
shell_speed_min = 120.0                    # Это минимальная скорость вылета гильзы. Диапазон скоростей помогает избежать одинаковой анимации на каждом выстреле.
shell_speed_max = 185.0                    # Это максимальная скорость вылета гильзы. Чем выше значение, тем энергичнее выглядит выброс.
shell_lifetime_seconds = 1.15              # Это время жизни гильзы на сцене. Через него регулируется визуальный шум после серии выстрелов.
shell_bounce_damping = 0.46                # Это коэффициент потери скорости при отскоке гильзы. Меньшее значение сильнее гасит движение после удара.
shell_max_bounces = 2                      # Это максимальное число отскоков гильзы. Ограничение помогает не засорять сцену бесконечной микрофизикой.

[weapons.pistol]
fire_interval_seconds = 0.22               # Это интервал между выстрелами пистолета. Более длинный интервал подчёркивает ритм одиночной стрельбы.
projectile_speed = 2400.0                  # Это техническая скорость пули или луча для расчётов. Параметр оставлен для общей модели оружия и VFX.
projectile_lifetime_seconds = 0.08         # Это время жизни пули или выстрельного следа в расчётах. Значение используется как служебный тайминг, даже если попадание считается мгновенно.
projectile_radius = 3.0                    # Это радиус попадания пули. Через него регулируется щедрость коллизии выстрела.
muzzle_offset = 28.0                       # Это смещение дула вперёд относительно центра персонажа. Параметр важен для точного старта луча и вспышки.
muzzle_side_offset = 11.0                  # Это боковое смещение дула. Оно помогает привязать выстрел к реальному стволу на спрайте.
tracer_every_n_shot = 3                    # Этот параметр задаёт частоту появления трассера. Не каждый выстрел рисует линию, чтобы картинка не была однообразной.
tracer_width = 4.0                         # Это толщина внешнего слоя трассера. Параметр отвечает за общую заметность линии.
tracer_core_width = 1.5                    # Это толщина яркого центрального ядра трассера. Он делает трассер более контрастным на фоне карты.
tracer_probability = 1.0                   # Это вероятность появления трассера при выполнении правила every_n_shot. При 1.0 трассер всегда будет создаваться.
tracer_min_fraction = 0.30                 # Это минимальная доля длины выстрела, которую занимает трассер. Меньшие значения делают след короче и резче.
tracer_max_fraction = 0.75                 # Это максимальная доля длины выстрела для трассера. Диапазон помогает делать следы менее одинаковыми.
tracer_lifetime_seconds = 0.05             # Это время жизни трассера на экране. Короткое значение поддерживает жёсткий аркадный ритм.
impact_mark_lifetime_seconds = 8.0         # Это время жизни следов попадания. Параметр влияет на визуальную память комнаты после боя.
impact_mark_max_count = 100                # Это лимит следов попаданий одновременно. Ограничение защищает сцену от засорения и потери производительности.
spread_degrees = 1.5                       # Это разброс пистолетного выстрела. Небольшой разброс оставляет оружие точным, но не идеально лазерным.
max_range = 700.0                          # Это максимальная дистанция эффективного выстрела. Дальше этой точки пистолетный луч не проверяется.
impact_mark_size = 8.0                     # Это размер следа попадания от пистолета. Через него можно отделить визуальный характер оружия от реального урона.
bullet_hole_diameter = 6.0                 # Это диаметр чёрной дырки от пули. Более крупное значение делает попадания заметнее.
damage = 28.0                              # Это урон одного пистолетного попадания. При текущем балансе пистолет обычно убивает за два выстрела.
muzzle_flash_size = 24.0                   # Это размер дульной вспышки. Пистолет должен читатьcя резко, но не как огромный факел.
muzzle_flash_lifetime_seconds = 0.05       # Это время жизни вспышки у дула. Значение помогает удержать ритм выстрела коротким и злым.
recoil_distance = 9.0                      # Это визуальная сила отдачи пистолета. Значение делает единичный выстрел ощущаемым и “панчевым”.
recoil_recovery_seconds = 0.075            # Это время возврата после отдачи. Оно влияет на то, насколько тяжёлым кажется пистолет в руке.
screen_shake_magnitude = 3.1               # Это сила экранной тряски при пистолетном выстреле. Параметр усиливает hit feel, но не должен мешать обзору.
screen_shake_duration_seconds = 0.06       # Это длительность тряски после выстрела. Короткая тряска обычно выглядит профессиональнее, чем длинная вибрация.
shell_enabled = true                       # Этот флаг включает выброс гильз для пистолета. Выключение убирает эффект полностью без изменения боевой логики.
shell_size = 4.6                           # Это размер пистолетной гильзы. Он должен быть немного преувеличен, чтобы эффект был хорошо виден сверху.
shell_speed_min = 118.0                    # Это минимальная скорость вылета пистолетной гильзы. Диапазон скоростей добавляет естественную вариативность.
shell_speed_max = 175.0                    # Это максимальная скорость вылета гильзы. Чем выше значение, тем энергичнее выглядит выброс.
shell_lifetime_seconds = 1.2               # Это время жизни гильзы на сцене. Параметр регулирует, как долго остаётся визуальный мусор после перестрелки.
shell_bounce_damping = 0.48                # Это потеря скорости гильзы при отскоке. Параметр помогает сделать её движение более правдоподобным и не слишком шумным.
shell_max_bounces = 2                      # Это максимум отскоков для пистолетной гильзы. Ограничение не даёт физике затянуться дольше нужного.

[weapons.smg]
fire_interval_seconds = 0.07               # Это интервал между выстрелами SMG. Короткий интервал создаёт ощущение быстрой очереди.
projectile_speed = 3200.0                  # Это техническая скорость пули или луча для расчётов. Значение удобно держать высоким для скоростного оружия.
projectile_lifetime_seconds = 0.05         # Это время жизни пули или выстрельного следа в расчётах. Параметр влияет на служебную механику и совместимость системы.
projectile_radius = 2.0                    # Это радиус попадания пули. Более узкое значение делает SMG менее щедрым, но более честным по ощущению.
muzzle_offset = 30.0                       # Это смещение дула вперёд от центра персонажа. Параметр нужен, чтобы очередь шла прямо из ствола.
muzzle_side_offset = 12.0                  # Это боковое смещение дула относительно центра. Значение подгоняется под спрайт оружия и направление ствола.
tracer_every_n_shot = 5                    # Этот параметр задаёт, на какой выстрел очереди рисовать трассер. Так очередь выглядит живее и не слишком шумно.
tracer_width = 1.2                         # Это толщина внешнего слоя трассера. Для SMG она сделана уже, чтобы линия не была слишком жирной.
tracer_core_width = 2.2                    # Это толщина яркого внутреннего ядра трассера. Ядро шире внешнего слоя для более агрессивного аркадного стиля.
tracer_probability = 1.0                   # Это вероятность создания трассера при выполнении правила every_n_shot. При 1.0 SMG всегда показывает выбранные трассеры.
tracer_min_fraction = 0.55                 # Это минимальная доля длины выстрела, которую занимает трассер. Для очереди сделано длиннее, чтобы лучше читалось направление огня.
tracer_max_fraction = 0.95                 # Это максимальная доля длины выстрела для трассера. Почти полный след делает очередь визуально жёстче.
tracer_lifetime_seconds = 0.09             # Это время жизни трассера на экране. Для скоростного оружия оно сделано чуть длиннее ради читаемости очереди.
impact_mark_lifetime_seconds = 5.0         # Это время жизни следов попадания от SMG. Значение меньше, чтобы сцена не забивалась слишком быстро.
impact_mark_max_count = 160                # Это максимум следов попадания одновременно. Для очередей лимит выше, чем у пистолета.
spread_degrees = 4.0                       # Это разброс выстрела в градусах. Он задаёт характер короткой очереди и не даёт SMG стать лазером.
max_range = 820.0                          # Это максимальная дальность выстрела. Значение чуть больше, чтобы оружие уверенно чувствовало себя в длинных помещениях.
impact_mark_size = 10.0                    # Это размер следа попадания от SMG. Параметр помогает делать шквальный огонь заметным на окружении.
bullet_hole_diameter = 1.0                 # Это диаметр чёрной дырки от пули. Малое значение даёт более мелкий и “сыпучий” характер очереди.
damage = 14.0                              # Это урон одной пули SMG. При текущем балансе короткая очередь убивает быстрее, чем один точный выстрел.
muzzle_flash_size = 40.0                   # Это размер дульной вспышки. У SMG вспышка сделана заметно ярче, чтобы очередь читалась на экране.
muzzle_flash_lifetime_seconds = 0.035      # Это время жизни вспышки у дула. Короткая вспышка лучше подходит для быстрого автоматического огня.
recoil_distance = 4.0                      # Это сила визуальной отдачи SMG. Значение небольшое, чтобы очередь не ломала силуэт игрока каждый кадр.
recoil_recovery_seconds = 0.03             # Это время возврата после отдачи. Короткий recovery нужен, чтобы автоматическая стрельба ощущалась быстрой.
screen_shake_magnitude = 1.3               # Это сила экранной тряски от одной пули SMG. Значение специально меньше, чем у пистолета, потому что выстрелов много.
screen_shake_duration_seconds = 0.035      # Это длительность тряски экрана. Для очереди нужен короткий импульс, иначе камера станет раздражать.
shell_enabled = true                       # Этот флаг включает выброс гильз у SMG. Гильзы хорошо поддерживают ощущение интенсивного огня.
shell_size = 6.2                           # Это размер гильзы SMG. Он слегка преувеличен ради читаемости в top-down ракурсе.
shell_speed_min = 120.0                    # Это минимальная скорость вылета гильзы. Диапазон помогает сделать очереди менее повторяющимися визуально.
shell_speed_max = 250.0                    # Это максимальная скорость вылета гильзы. Более высокий потолок делает выброс живее и агрессивнее.
shell_lifetime_seconds = 4.0               # Это время жизни гильзы на сцене. Для очереди значение увеличено, чтобы после боя оставалась заметная визуальная память.
shell_bounce_damping = 0.42                # Это коэффициент потери скорости при отскоке гильзы. Он определяет, насколько энергично гильза будет вести себя после удара о пол.
shell_max_bounces = 4                      # Это максимум отскоков гильзы. Для автоматического оружия чуть больше отскоков выглядит убедительнее.

[enemies.grunt]
count_small = 3                            # Это число базовых врагов на маленькой карте. Параметр позволяет отдельно держать плотность боя для каждого размера уровня.
count_medium = 5                           # Это число базовых врагов на средней карте. Значение задаёт дефолтный темп столкновений для стандартного режима.
count_large = 8                            # Это число базовых врагов на большой карте. Параметр нужен, чтобы large не ощущался пустым.
speed = 125.0                              # Это скорость перемещения врага. Значение влияет на давление, погоню и общую агрессивность AI.
health = 40.0                              # Это скрытое здоровье врага. Мы не показываем полоску, но через этот параметр регулируем число попаданий до смерти.
width_ratio = 0.56                         # Это ширина хитбокса врага относительно тайла. Параметр нужен, чтобы коллизия не казалась несправедливой.
height_ratio = 0.56                        # Это высота хитбокса врага относительно тайла. Значение помогает синхронизировать модель движения со спрайтом.
vision_distance = 420.0                    # Это максимальная дистанция, на которой враг может обнаружить игрока. Параметр работает вместе с LOS и углом обзора.
vision_fov_degrees = 75.0                  # Это угол обзора врага в градусах. Чем он шире, тем опаснее прямой вход в помещение.
stop_distance = 88.0                       # Это дистанция, на которой враг прекращает тупо сближаться в лоб. Дальше поведение должно переходить в стрейф, огонь или смену позиции.
attack_damage = 12.0                       # Это урон ближней атаки врага. Параметр остаётся полезным как fallback, даже если основной бой идёт на огнестреле.
attack_interval_seconds = 0.9              # Это интервал между атаками врага. Значение ограничивает спам атакой в упор.
attack_range = 56.0                        # Это дистанция, на которой враг может выполнить ближнюю атаку. Параметр нужен для честного контакта в тесных проходах.
corpse_lifetime_seconds = 18.0             # Это время, сколько тело врага лежит на уровне. Трупы помогают комнате “помнить” бой и усиливают композицию сцены.
memory_seconds = 1.35                      # Это время, в течение которого враг помнит последнюю известную позицию игрока. Параметр делает поиск после потери контакта осмысленным.
strafe_speed_multiplier = 0.55             # Это множитель скорости бокового движения врага. Через него регулируется, насколько активно враг двигается у цели.
separation_distance = 42.0                 # Это желаемая дистанция между врагами. Параметр нужен, чтобы боты не слипались в одну кучу.
separation_strength = 0.9                  # Это сила, с которой враги расталкивают друг друга. Значение влияет на естественность группового давления.
search_turn_speed_degrees = 180.0          # Это скорость разворота врага в поисковом режиме. Параметр помогает сделать сканирование помещения читаемым.
fire_weapon_name = "pistol"                # Это имя оружия, которым пользуется враг. Значение должно совпадать с названием секции в блоке weapons.
fire_reaction_seconds = 0.18               # Это короткая задержка перед выстрелом врага. Она нужна, чтобы огонь был опасным, но читаемым для игрока.
coordination_range = 220.0                 # Это радиус локальной координации между ботами. Только союзники в этом диапазоне подхватывают тревогу и last known position.
cover_search_radius_tiles = 6              # Это радиус поиска укрытий в тайлах. Параметр ограничивает, насколько далеко бот будет смотреть за хорошей позицией.
reload_seconds = 1.1                       # Это длительность перезарядки врага. Во время неё бот должен искать безопасность, а не давить в лоб.
magazine_size = 8                          # Это размер магазина оружия врага. Параметр определяет, как часто AI будет входить в состояние reload.
retreat_health_threshold = 0.35            # Это порог здоровья, ниже которого враг начинает предпочитать отход. Значение помогает сделать поведение осторожнее и правдоподобнее.
fire_range = 260.0                         # Это дистанция, на которой враг считает огнестрел осмысленным. Дальше этого радиуса он чаще будет сближаться или искать угол.
reposition_cooldown_seconds = 1.6          # Это минимальный интервал между осмысленными сменами позиции. Параметр нужен, чтобы бот не дёргался каждые полсекунды.
min_hold_position_seconds = 1.2            # Это минимальное время удержания текущей позиции после занятия укрытия. Значение делает поведение спокойнее и тактичнее.
reposition_min_distance = 96.0             # Это минимальная дистанция, на которую бот согласен смещаться при reposition. Параметр отсекает мелкую суету на пару пикселей.
reposition_chance = 0.35                   # Это шанс, что бот вообще решит сместиться, если reposition разрешён логикой. Значение помогает убрать излишнюю нервозность и оставить только осмысленные рывки.

[generation]
retry_count = 24                           # Это число попыток генерации карты до отказа. Параметр нужен, чтобы не принимать неудачный layout с первого раза.
corridor_half_width = 1                    # Это половина ширины коридора в тайлах. Через параметр управляется теснота переходов и choke points.
min_open_ratio = 0.18                      # Это минимальная доля открытого пространства карты. Значение защищает генератор от слишком душных лабиринтов.
max_open_ratio = 0.62                      # Это максимальная доля открытого пространства карты. Параметр не даёт уровню превратиться в пустой ангар.

[generation.sizes.small]
width = 40                                 # Это ширина маленькой карты в тайлах. Размер влияет на темп контактов и общую плотность боя.
height = 40                                # Это высота маленькой карты в тайлах. Вместе с шириной она задаёт игровое пространство small-режима.
room_attempts = 18                         # Это число попыток размещения комнат. Больше попыток обычно даёт более сложный layout, но дороже по генерации.
room_min_size = 5                          # Это минимальный размер комнаты в тайлах. Значение задаёт нижнюю границу для тесных помещений.
room_max_size = 9                          # Это максимальный размер комнаты в тайлах. Через него регулируется, насколько просторной может быть small-карта.

[generation.sizes.medium]
width = 64                                 # Это ширина средней карты в тайлах. Medium должен быть базовым и наиболее сбалансированным размером.
height = 64                                # Это высота средней карты в тайлах. Вместе с шириной она задаёт стандартный масштаб уровня.
room_attempts = 28                         # Это число попыток размещения комнат на средней карте. Параметр даёт генератору больше свободы для интересных связей.
room_min_size = 6                          # Это минимальный размер комнаты. Значение помогает medium-карте не быть слишком тесной.
room_max_size = 12                         # Это максимальный размер комнаты. Через него регулируется размер основных боевых зон.

[generation.sizes.large]
width = 96                                 # Это ширина большой карты в тайлах. Large должен давать больше маршрутов, а не просто больше пустоты.
height = 96                                # Это высота большой карты в тайлах. Вместе с шириной она задаёт простор для дополнительных боевых секторов.
room_attempts = 42                         # Это число попыток размещения комнат на большой карте. Параметр помогает генератору собрать более сложную структуру зон.
room_min_size = 7                          # Это минимальный размер комнаты на large-карте. Значение удерживает просторный масштаб даже у вторичных помещений.
room_max_size = 15                         # Это максимальный размер комнаты на большой карте. Через него формируются крупные боевые зоны и дворы.

[render]
background_color = [24, 26, 32, 255]       # Это цвет фона в формате RGBA. Значение используется там, где мир не перекрывает экран целиком.
show_grid = false                          # Этот флаг включает или выключает сетку тайлов. Параметр удобен для отладки, но обычно не нужен в обычной игре.

[logging]
level = "INFO"                             # Это уровень логирования. Через него регулируется, насколько подробные сообщения пишутся в лог.
log_to_file = true                         # Этот флаг включает запись логов в файл. Он полезен для отладки багов и воспроизведения проблем.
file = "logs/game.log"                     # Это путь к файлу логов. Значение может быть изменено, если нужна другая структура папок.
use_colors = true                          # Этот флаг включает цветной вывод в консоль. Цвета помогают быстрее читать логи во время разработки.

[i18n]
default_language = "en"                    # Это язык интерфейса по умолчанию. Значение используется при первом старте и без сохранения настроек.
available_languages = ["en", "ua"]         # Это список доступных языков интерфейса. Через него удобно расширять локализацию без изменений в коде.

[effects.impact_debris]
enabled = true                             # Включён ли эффект крошек от попаданий в окружение.
intensity = 0.95                           # Общая насыщенность выброса крошек.
size_min = 1.5                             # Минимальный размер крошки.
size_max = 14.0                            # Максимальный размер крошки.
speed_min = 70.0                           # Минимальная скорость разлёта крошек.
